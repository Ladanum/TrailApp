  addBtn.addEventListener('mouseover', () => addBtn.style.background = '#52cb63');
  addBtn.addEventListener('mouseout', () => addBtn.style.background = '#3FB950');
  addBtn.addEventListener('click', () => {
    state.showingExtraForm = true;
    const modal = renderExtraActivityModal();
    document.body.appendChild(modal);
  });
  wrap.appendChild(addBtn);

  // Plan bar
  const pb = el('div', { class: 'plan-bar' },
    el('div', { class: 'plan-bar-top' },
      el('span', { class: 'plan-bar-label' }, 'Plan 52 semanas'),
      el('span', { class: 'plan-bar-sem' }, 'SEM 01 / 52')
    ),
    el('div', { class: 'plan-bar-track' }, el('div', { class: 'plan-bar-fill' })),
    el('div', { class: 'plan-bar-meta' },
      el('span', {}, el('span', { style: 'color:#388BFD' }, '●') , ' MF1 activa'),
      el('span', {}, 'CP1: 6 sep 2026'),
      el('span', {}, 'CP2: 27 dic 2026'),
      el('span', {}, 'CP3: 18 abr 2027'),
      el('span', {}, 'RACE: 12 jun 2027')
    )
  );
  wrap.appendChild(pb);

  // Calculate current week
  const planStart = new Date('2026-06-15');
  const today = new Date();
  const daysDiff = Math.floor((today - planStart) / (1000 * 60 * 60 * 24));
  const currentWeekIndex = Math.floor(daysDiff / 7) * 7;
  const weekSessions = SESSIONS.filter(s => s.index >= currentWeekIndex && s.index < currentWeekIndex + 7);

  // Planned sessions
  const scroll = el('div', { class: 'week-scroll' });
  const grid = el('div', { class: 'week-grid' });
  weekSessions.forEach(s => {
    const done = !!state.completedDays[s.index];
    const data = state.workoutData[s.index];
    const today = new Date();
    const sessionDate = new Date(s.fullDate.split(', ')[1]);
    const isPast = today > sessionDate;
    const isToday = s.index === 0;

    let cardClass = 'session-card';
    let cardStyle = '';

    if (isToday && !done) {
      // Present day: current color
      cardClass += ' today';
    } else if (done && data) {
      // Completed with data
      if (data.sensaciones >= 4) {
        // Satisfied: light green
        cardStyle = 'background:rgba(63,185,80,0.15);border-color:rgba(63,185,80,0.4);';
      } else {
        // Below expectations: light yellow
        cardStyle = 'background:rgba(240,193,62,0.15);border-color:rgba(240,193,62,0.4);';
      }
    } else if (!done && isPast) {
      // Not completed after date: light red
      cardStyle = 'background:rgba(240,88,88,0.15);border-color:rgba(240,88,88,0.4);';
    }

    const card = el('div', { class: cardClass, style: cardStyle });
    card.addEventListener('click', () => openSession(s.index));

    const top = el('div', { class: 'card-top' },
      el('div', { class: 'card-day' }, s.day)
    );
    if (done) {
      const chk = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      chk.setAttribute('width', '14'); chk.setAttribute('height', '14'); chk.setAttribute('viewBox', '0 0 14 14');
      chk.innerHTML = '<circle cx="7" cy="7" r="6" fill="rgba(63,185,80,0.18)"/><path d="M4.5 7L6.5 9L9.5 4.5" stroke="#3FB950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
      top.appendChild(chk);
    } else {
      // Show red cross only if date has passed
      const today = new Date();
      const sessionDate = new Date(s.fullDate.split(', ')[1]); // Extract date from "Lunes, 15 jun 2026"
      if (today > sessionDate) {
        const cross = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        cross.setAttribute('width', '14'); cross.setAttribute('height', '14'); cross.setAttribute('viewBox', '0 0 14 14');
        cross.innerHTML = '<circle cx="7" cy="7" r="6" fill="rgba(240,88,88,0.18)"/><path d="M4.5 4.5L9.5 9.5M9.5 4.5L4.5 9.5" stroke="#f05858" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
        top.appendChild(cross);
      }
    }
    card.appendChild(top);
    card.appendChild(el('div', { class: 'card-date' }, s.date));
    card.appendChild(el('span', { class: badgeClass(s.cat) }, s.type));
    card.appendChild(el('div', { class: 'card-desc' }, s.description));
    const bot = el('div', { class: 'card-bottom' }, el('span', { class: 'card-dur' }, s.duration));
    if (s.alert) bot.appendChild(el('span', { class: 'alert-chip' }, 'tobillo'));
    card.appendChild(bot);
    grid.appendChild(card);
  });
  scroll.appendChild(grid);
  wrap.appendChild(scroll);

  // Results week
  const resultsSection = el('div', {});
  resultsSection.appendChild(el('div', { style: 'font-size:13px;font-weight:600;color:#8B949E;margin-bottom:12px;letter-spacing:0.05em;text-transform:uppercase' }, 'Resultados Reales'));
  const resultsScroll = el('div', { class: 'week-scroll' });
  const resultsGrid = el('div', { class: 'week-grid' });

  // Show completed sessions (only current week)
  weekSessions.forEach(s => {
    const done = !!state.completedDays[s.index];
    const data = state.workoutData[s.index];
    const card = el('div', { class: 'session-card' + (done ? ' done' : ''), style: done ? '' : 'opacity:0.5' });

    const top = el('div', { class: 'card-top' }, el('div', { class: 'card-day' }, s.day));
    card.appendChild(top);
    card.appendChild(el('div', { class: 'card-date' }, s.date));

    // Show description for gym/rec workouts
    if (done && (s.cat === 'gym' || s.cat === 'rec')) {
      card.appendChild(el('div', { class: 'card-desc' }, s.description));
    }

    if (done && data) {
      const metricsDiv = el('div', { style: 'display:flex;flex-direction:column;gap:6px;flex:1;margin:8px 0' });
      if (data.distance) metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#3FB950;font-family:monospace' }, data.distance + ' km'));
      if (data.duration) metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#388BFD;font-family:monospace' }, data.duration + ' min'));
      if (data.elevation) metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#F0883E;font-family:monospace' }, data.elevation + ' m'));
      if (data.distance && data.duration && (s.cat === 'zone' || s.cat === 'tl')) {
        const ritmoDecimal = data.duration / data.distance;
        const minutos = Math.floor(ritmoDecimal);
        const segundos = Math.round((ritmoDecimal - minutos) * 60);
        const ritmoMedio = minutos + ':' + (segundos < 10 ? '0' : '') + segundos;
        metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#A371F7;font-family:monospace' }, 'ø ' + ritmoMedio + ' min/km'));
      }
      if (data.hr) metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#A371F7;font-family:monospace' }, data.hr + ' bpm'));
      if (data.sensaciones) metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#E6EDF3;font-family:monospace' }, 'Sen: ' + data.sensaciones + '/5'));
      if (data.activityType) metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#79C0FF;font-family:monospace;font-weight:600' }, data.activityType));
      card.appendChild(metricsDiv);

      const btnDiv = el('div', { style: 'display:flex;gap:6px;margin-top:8px' });
      const editBtn = el('button', { style: 'flex:1;padding:4px;font-size:10px;background:#A371F7;border:none;border-radius:3px;color:#fff;cursor:pointer' });
      editBtn.textContent = '✏️ Editar';
      editBtn.addEventListener('click', () => openEditResultModal(s.index, s));

      const delBtn = el('button', { style: 'flex:1;padding:4px;font-size:10px;background:#DA3633;border:none;border-radius:3px;color:#fff;cursor:pointer' });
      delBtn.textContent = '🗑️ Eliminar';
      delBtn.addEventListener('click', () => {
        if (confirm('¿Eliminar este resultado?')) {
          state.completedDays[s.index] = false;
          delete state.workoutData[s.index];
          saveState();
          paintDashboard();
        }
      });

      btnDiv.appendChild(editBtn);
      btnDiv.appendChild(delBtn);
      card.appendChild(btnDiv);
    } else {
      card.appendChild(el('div', { style: 'flex:1;display:flex;align-items:center;justify-content:center;color:#8B949E;font-size:12px' }, '—'));
    }

    resultsGrid.appendChild(card);
  });

  resultsScroll.appendChild(resultsGrid);
  resultsSection.appendChild(resultsScroll);
  wrap.appendChild(resultsSection);

  // Extra Activities section (right after results)
  if (state.extraActivities.length > 0) {
    extrasSection = el('div', {});
    extrasSection.appendChild(el('div', { style: 'font-size:13px;font-weight:600;color:#8B949E;margin-bottom:12px;letter-spacing:0.05em;text-transform:uppercase' }, 'Actividades Extra'));
    const extrasScroll = el('div', { class: 'week-scroll' });
    const extrasGrid = el('div', { class: 'week-grid' });

    // Sort extra activities by date
    const sortedExtras = [...state.extraActivities].sort((a, b) => new Date(a.date + 'T00:00:00Z') - new Date(b.date + 'T00:00:00Z'));

    sortedExtras.forEach(act => {
      const card = el('div', { class: 'session-card done', style: 'opacity:0.9' });
      const dateObj = new Date(act.date + 'T00:00:00Z');
      const dayStr = dateObj.toLocaleDateString('es-ES', {weekday:'short'}).substring(0,3).toUpperCase();
      const dateStr = dateObj.toLocaleDateString('es-ES', {month:'short', day:'numeric'});

      const top = el('div', { class: 'card-top' }, el('div', { class: 'card-day' }, dayStr));
      card.appendChild(top);
      card.appendChild(el('div', { class: 'card-date' }, dateStr));
      card.appendChild(el('span', { class: 'badge badge-quality' }, act.type.toUpperCase()));
      card.appendChild(el('div', { class: 'card-desc' }, act.name));

      const metricsDiv = el('div', { style: 'display:flex;flex-direction:column;gap:6px;flex:1;margin:8px 0' });
      if (act.data.distance) metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#3FB950;font-family:monospace' }, act.data.distance + ' km'));
      if (act.duration) metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#388BFD;font-family:monospace' }, act.duration + ' min'));
      if (act.data.elevation) metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#F0883E;font-family:monospace' }, act.data.elevation + ' m'));
      if (act.data.distance && act.duration && (act.type === 'zone' || act.type === 'tl')) {
        const ritmoDecimal = act.duration / act.data.distance;
        const minutos = Math.floor(ritmoDecimal);
        const segundos = Math.round((ritmoDecimal - minutos) * 60);
        const ritmoMedio = minutos + ':' + (segundos < 10 ? '0' : '') + segundos;
        metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#A371F7;font-family:monospace' }, 'ø ' + ritmoMedio + ' min/km'));
      }
      if (act.sensaciones) metricsDiv.appendChild(el('div', { style: 'font-size:11px;color:#E6EDF3;font-family:monospace' }, 'Sen: ' + act.sensaciones + '/5'));
      card.appendChild(metricsDiv);

      const btnDiv = el('div', { style: 'display:flex;gap:6px;margin-top:8px' });
      const editBtn = el('button', { style: 'flex:1;padding:4px;font-size:10px;background:#A371F7;border:none;border-radius:3px;color:#fff;cursor:pointer' });
      editBtn.textContent = '✏️ Editar';
      editBtn.addEventListener('click', () => openEditExtraModal(act.id));

      const delBtn = el('button', { style: 'flex:1;padding:4px;font-size:10px;background:#DA3633;border:none;border-radius:3px;color:#fff;cursor:pointer' });
      delBtn.textContent = '🗑️ Eliminar';
      delBtn.addEventListener('click', () => {
        if (confirm('¿Eliminar esta actividad?')) {
          state.extraActivities = state.extraActivities.filter(a => a.id !== act.id);
          saveExtraActivities();
          paintDashboard();
        }
      });

      btnDiv.appendChild(editBtn);
      btnDiv.appendChild(delBtn);
      card.appendChild(btnDiv);

      extrasGrid.appendChild(card);
    });

    extrasScroll.appendChild(extrasGrid);
    extrasSection.appendChild(extrasScroll);
    wrap.appendChild(extrasSection);
  }

  // Calculate planned weekly stats (week 1)
  const weekPlan = WEEKS_PLAN[0]; // Week 1
  let plannedTime = 0;
  SESSIONS.forEach(s => {
    const duration = parseInt(s.duration) || 0;
    plannedTime += duration;
  });

  const plannedHours = Math.floor(plannedTime / 60);
  const plannedMins = plannedTime % 60;
  const plannedTimeStr = plannedHours > 0 ? `${plannedHours}h ${plannedMins}min` : `${plannedMins}min`;

  // Planned stats
  const plannedStats = el('div', { class: 'stat-grid' },
    makeStatCard('Volumen sem.', weekPlan.vol + ' km', 'distancia planificada', '#8B949E'),
    makeStatCard('D+ acumulado', weekPlan.elev + ' m', 'desnivel planificado', '#8B949E'),
    makeStatCard('Tiempo total', plannedTimeStr, 'horas planificadas', '#8B949E')
  );
  wrap.appendChild(plannedStats);

  // Calculate real weekly stats
  let totalDistance = 0;
  let totalElevation = 0;
  let totalTime = 0;

  SESSIONS.forEach(s => {
    if (state.completedDays[s.index]) {
      const data = state.workoutData[s.index];
      if (data) {
        totalDistance += parseFloat(data.distance) || 0;
        totalElevation += parseInt(data.elevation) || 0;
        totalTime += parseInt(data.duration) || 0;
      }
    }
  });

  state.extraActivities.forEach(act => {
    totalDistance += parseFloat(act.data.distance) || 0;
    totalElevation += parseInt(act.data.elevation) || 0;
    totalTime += parseInt(act.duration) || 0;
  });

  const hours = Math.floor(totalTime / 60);
  const mins = totalTime % 60;
  const timeStr = hours > 0 ? `${hours}h ${mins}min` : `${mins}min`;

  // Real stats
  const stats = el('div', { class: 'stat-grid' },
    makeStatCard('Volumen sem.', totalDistance.toFixed(1) + ' km', 'distancia real', '#3FB950'),
    makeStatCard('D+ acumulado', totalElevation + ' m', 'desnivel real', '#F0883E'),
    makeStatCard('Tiempo total', timeStr, 'horas reales', '#388BFD')
  );
  wrap.appendChild(stats);

  return wrap;
}

function makeStatCard(label, val, sub, color) {
  return el('div', { class: 'stat-card' },
    el('div', { class: 'stat-label' }, label),
    el('div', { class: 'stat-val', style: 'color:' + color }, val),
    el('div', { class: 'stat-sub' }, sub)
  );
}

function renderSession(idx) {
  const s = SESSIONS[idx];
  const done = !!state.completedDays[s.index];
  const wrap = el('div', { class: 'detail-wrap' });

  // Si es un entreno de fuerza con variantes, usar la variante seleccionada
  if (s.blocksVariants) {
    s.blocks = s.blocksVariants[state.strengthVariant] || s.blocksVariants['con-equipamiento'];
  }

  // Back
  const back = el('button', { class: 'back-btn' });
  const bsv = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  bsv.setAttribute('width','16'); bsv.setAttribute('height','16'); bsv.setAttribute('viewBox','0 0 16 16');
  bsv.innerHTML = '<path d="M10 3L5 8L10 13" stroke="#8B949E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
  back.appendChild(bsv); back.append('Volver al dashboard');
  back.addEventListener('click', () => setView('dashboard'));
  wrap.appendChild(back);

  wrap.appendChild(el('div', { class: 'detail-date' }, s.fullDate));
  const meta = el('div', { class: 'detail-meta' },
    el('span', { class: badgeClass(s.cat) }, s.type),
    el('span', { style: 'font-family:monospace;font-size:12px;color:#8B949E' }, s.duration)
  );
  if (s.alert) meta.appendChild(el('span', { style: 'font-size:11px;color:#F0883E;background:rgba(240,136,62,0.1);border:1px solid rgba(240,136,62,0.2);border-radius:4px;padding:2px 8px;font-family:monospace' }, '⚠ tobillo'));
  wrap.appendChild(meta);
  wrap.appendChild(el('h1', { class: 'detail-title' }, s.description));

  // Strength variant selector (for GYM sessions)
  if (s.type === 'GYM' && s.blocksVariants) {
    const variantContainer = el('div', { style: 'display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap' });
    variantContainer.appendChild(el('div', { style: 'font-size:11px;color:#8B949E;font-weight:600;letter-spacing:0.05em;text-transform:uppercase' }, 'Tipo de fuerza:'));

    ['con-equipamiento', 'peso-libre'].forEach(variant => {
      const btn = el('button', {
        type: 'button',
        class: 'control-btn' + (state.strengthVariant === variant ? ' primary' : ''),
        style: state.strengthVariant === variant ? 'background:#3FB950;color:#0D1117;border-color:#3FB950' : 'background:transparent;color:#E6EDF3;border:1px solid #21262D'
      });
      const label = variant === 'con-equipamiento' ? 'Con Equipamiento' : 'Peso Libre';
      btn.textContent = label;
      btn.addEventListener('click', () => {
        state.strengthVariant = variant;
        localStorage.setItem('trailapp_strength_variant', variant);
        const container = document.getElementById('view-session');
        container.innerHTML = '';
        container.classList.remove('fade-in');
        void container.offsetWidth;
        container.classList.add('fade-in');
        container.appendChild(renderSession(idx));
      });
      variantContainer.appendChild(btn);
    });
    wrap.appendChild(variantContainer);
  }

  // Info card
  const info = el('div', { class: 'info-card' });
  if (s.zone) {
    info.appendChild(el('div', { class: 'info-label' }, 'Zona objetivo'));
    info.appendChild(el('div', { class: 'info-zone' }, s.zone));
  } else {
    info.appendChild(el('div', { class: 'info-label' }, 'Protocolo'));
  }
  info.appendChild(el('div', { class: 'info-desc' }, s.detail));
  wrap.appendChild(info);

  // Blocks
  if (s.blocks) {
    const bl = el('div', { class: 'block-list' });
    s.blocks.forEach(b => {
      const bc = el('div', { class: 'block-card' });
      bc.appendChild(el('div', { class: 'block-header' },
        el('div', { class: 'block-id' }, b.id),
        el('div', { class: 'block-name' }, b.name)
      ));
      const tbl = el('div', { class: 'ex-table' },
        el('div', { class: 'ex-th' }, 'Ejercicio'),
        el('div', { class: 'ex-th', style: 'text-align:right' }, 'Ser.'),
        el('div', { class: 'ex-th', style: 'text-align:right' }, 'Reps')
      );
      b.exercises.forEach(([name, sets, reps]) => {
        tbl.appendChild(el('div', { class: 'ex-cell' }, name));
        tbl.appendChild(el('div', { class: 'ex-sets' }, sets));
        tbl.appendChild(el('div', { class: 'ex-reps' }, reps));
      });
      bc.appendChild(tbl);
      bl.appendChild(bc);
    });
    wrap.appendChild(bl);
  }

  // Complete button or Form
  if (state.showingForm && state.selectedDay === idx && !done) {
    // Show form for completing workout (dynamic by type)
    const formContainer = el('div', { style: 'background:#0D1117;border:1px solid #21262D;border-radius:8px;margin-bottom:40px;display:flex;flex-direction:column;max-height:70vh' });
    const formContent = el('div', { style: 'overflow-y:auto;padding:20px;flex:1;padding-bottom:40px' });
    const form = el('form', { style: '' });

    const formTitle = el('h3', { style: 'font-size:14px;font-weight:600;margin-bottom:16px;color:#E6EDF3' }, '✓ Registrar Entreno Realizado');
    form.appendChild(formTitle);
    formContent.appendChild(form);

    // Field references for easier access
    const formFields = {};

    // Zone/TL workouts
    if (s.cat === 'zone' || s.cat === 'tl') {
      formFields.distance = el('input', { type: 'number', step: '0.1', placeholder: 'ej: 10.5', style: 'width:100%;padding:8px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-family:monospace' });
      form.appendChild(el('div', { style: 'margin-bottom:12px' },
        el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:4px' }, 'Distancia (km)'),
        formFields.distance
      ));

      formFields.duration = el('input', { type: 'number', placeholder: 'ej: 60', style: 'width:100%;padding:8px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-family:monospace' });
      form.appendChild(el('div', { style: 'margin-bottom:12px' },
        el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:4px' }, 'Duración (minutos)'),
        formFields.duration
      ));

      formFields.elevation = el('input', { type: 'number', placeholder: 'ej: 500', style: 'width:100%;padding:8px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-family:monospace' });
      form.appendChild(el('div', { style: 'margin-bottom:12px' },
        el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:4px' }, 'Desnivel positivo (m)'),
        formFields.elevation
      ));

      formFields.hr = el('input', { type: 'number', placeholder: 'ej: 150', style: 'width:100%;padding:8px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-family:monospace' });
      form.appendChild(el('div', { style: 'margin-bottom:12px' },
        el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:4px' }, 'FC Media (bpm)'),
        formFields.hr
      ));

      formFields.sensaciones = el('input', { type: 'number', min: '1', max: '5', placeholder: 'ej: 4', style: 'width:100%;padding:8px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-family:monospace' });
      form.appendChild(el('div', { style: 'margin-bottom:12px' },
        el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:4px' }, 'Sensaciones (1-5)'),
        formFields.sensaciones
      ));

      formFields.zone = el('select', { style: 'width:100%;padding:8px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-size:11px' },
        el('option', { value: '' }, '— Sin zona específica —'),
        el('option', { value: 'Z1' }, 'Z1 (60–68% FC)'),
        el('option', { value: 'Z2' }, 'Z2 (69–76% FC)'),
        el('option', { value: 'Z3' }, 'Z3 (77–84% FC)'),
        el('option', { value: 'Z4' }, 'Z4 (85–92% FC)'),
        el('option', { value: 'Z5' }, 'Z5 (93–100% FC)')
      );
      form.appendChild(el('div', { style: 'margin-bottom:12px' },
        el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:4px' }, 'Zona de Entrenamiento'),
        formFields.zone
      ));
    }

    // Gym/Recovery workouts with exercises
    if (s.cat === 'gym' || s.cat === 'rec') {
      if (s.blocks) {
        s.blocks.forEach(b => {
          form.appendChild(el('div', { style: 'margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #21262D' },
            el('div', { style: 'font-size:12px;font-weight:600;color:#E6EDF3;margin-bottom:12px' }, b.name),
            el('div', { style: 'display:flex;flex-direction:column;gap:8px' }, ...b.exercises.map(([name, sets, reps], i) =>
              el('div', { style: 'display:flex;align-items:center;gap:8px;font-size:11px' },
                el('div', { style: 'flex:1;color:#8B949E' }, name),
                el('input', { type: 'number', min: '0', placeholder: 'Ser', value: sets, style: 'width:40px;padding:4px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;text-align:center;font-size:11px' }),
                el('span', { style: 'color:#8B949E;font-size:10px' }, '×'),
                el('input', { type: 'text', placeholder: 'Reps', value: reps, style: 'flex:0 0 70px;padding:4px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-size:11px' })
              )
            ))
          ));
        });
      }

      // Duration for gym/rec
      formFields.duration = el('input', { type: 'number', placeholder: 'ej: 60', style: 'width:100%;padding:8px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-family:monospace;margin-top:12px' });
      form.appendChild(el('div', { style: 'margin-bottom:12px' },
        el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:4px' }, 'Duración (minutos)'),
        formFields.duration
      ));
    }

    // Shoes selector
    formFields.shoe = el('select', { style: 'width:100%;padding:8px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-size:11px;margin-bottom:8px' });
    formFields.shoe.appendChild(el('option', { value: '' }, '— Selecciona un calzado —'));
    state.shoes.forEach(shoe => {
      formFields.shoe.appendChild(el('option', { value: shoe }, shoe));
    });

    const shoeDiv = el('div', { style: 'margin-bottom:12px' },
      el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:4px' }, 'Calzado utilizado'),
      formFields.shoe
    );

    const addShoeBtn = el('button', { type: 'button', style: 'width:100%;padding:6px;font-size:10px;background:#3FB950;border:none;border-radius:3px;color:#fff;cursor:pointer;margin-bottom:12px' });
    addShoeBtn.textContent = '+ Agregar nuevo calzado';
    addShoeBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const shoeName = prompt('Nombre del calzado (ej: Nike Zoom Vaporfly):');
      if (shoeName && !state.shoes.includes(shoeName)) {
        state.shoes.push(shoeName);
        saveShoes();
        // Update the select options
        formFields.shoe.appendChild(el('option', { value: shoeName }, shoeName));
      }
    });

    form.appendChild(shoeDiv);
    form.appendChild(addShoeBtn);

    // Notes (all types)
    formFields.notes = el('textarea', { placeholder: 'Observaciones, cómo te sentiste, etc.', style: 'width:100%;padding:8px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-family:monospace;min-height:60px;resize:vertical' });
    form.appendChild(el('div', { style: 'margin-bottom:16px' },
      el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:4px' }, 'Notas'),
      formFields.notes
    ));

    // Buttons
    const btnGroup = el('div', { style: 'display:flex;gap:8px' });
    const saveBtn = el('button', { type: 'button', class: 'complete-btn undone', style: 'flex:1' });
    saveBtn.textContent = '✓ Guardar y completar';
    saveBtn.addEventListener('click', () => {
      const data = {};

      if (s.cat === 'zone' || s.cat === 'tl') {
        data.distance = parseFloat(formFields.distance.value) || 0;
        data.duration = parseInt(formFields.duration.value) || 0;
        data.elevation = parseInt(formFields.elevation.value) || 0;
        data.hr = parseInt(formFields.hr.value) || 0;
        data.sensaciones = parseInt(formFields.sensaciones.value) || 0;
        data.zone = formFields.zone.value || '';
        data.shoe = formFields.shoe.value || '';
        data.notes = formFields.notes.value;
      } else if (s.cat === 'gym' || s.cat === 'rec') {
        const exercises = [];
        const exerciseInputs = form.querySelectorAll('input[type="number"], input[type="text"]');
        let inputIdx = 0;
        if (s.blocks) {
          s.blocks.forEach(b => {
            b.exercises.forEach(([name, sets, reps], i) => {
              exercises.push({
                name,
                setsCompleted: parseInt(exerciseInputs[inputIdx]?.value) || 0,
                repsCompleted: exerciseInputs[inputIdx + 1]?.value || ''
              });
              inputIdx += 2;
            });
          });
        }
        data.exercises = exercises;
        data.duration = parseInt(formFields.duration.value) || 0;
        data.activityType = s.cat === 'gym' ? 'Fuerza' : 'Movilidad';
        data.shoe = formFields.shoe.value || '';
        data.notes = formFields.notes.value;
      }

      state.workoutData[idx] = data;
      localStorage.setItem('trailapp_workouts', JSON.stringify(state.workoutData));
      state.completedDays[s.index] = true;
      saveState();
      state.showingForm = false;
      if (document.getElementById('view-progress').style.display !== 'none') {
        updateProgressCharts();
      }
      openSession(idx);
    });

    const cancelBtn = el('button', { type: 'button', class: 'complete-btn done-state', style: 'flex:1' });
    cancelBtn.textContent = 'Cancelar';
    cancelBtn.addEventListener('click', () => {
      state.showingForm = false;
      openSession(idx);
    });

    btnGroup.appendChild(saveBtn);
    btnGroup.appendChild(cancelBtn);

    formContainer.appendChild(formContent);
    const btnDiv = el('div', { style: 'padding:16px 20px;border-top:1px solid #21262D;background:#0D1117;display:flex;gap:8px' });
    btnDiv.appendChild(btnGroup);
    formContainer.appendChild(btnDiv);
    wrap.appendChild(formContainer);
  } else {
    // Regular complete button
    const btn = el('button', { class: 'complete-btn ' + (done ? 'done-state' : 'undone') });
    btn.textContent = done ? '✓ Sesión completada — clic para desmarcar' : 'Marcar como completada';
    btn.addEventListener('click', () => {
      if (!done) {
        state.showingForm = true;
        openSession(idx);
      } else {
        state.completedDays[s.index] = false;
        saveState();
        state.showingForm = false;
        openSession(idx);
      }
    });
    wrap.appendChild(btn);

    // Show workout results if completed
    if (done && state.workoutData[idx]) {
      const data = state.workoutData[idx];
      const resultsCard = el('div', { class: 'info-card', style: 'margin-top:16px' });
      resultsCard.appendChild(el('div', { class: 'info-label' }, 'Resultados Reales'));

      // Zone/TL results
      if (s.cat === 'zone' || s.cat === 'tl') {
        const resultsGrid = el('div', { style: 'display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px' });
        if (data.distance) resultsGrid.appendChild(el('div', {},
          el('div', { style: 'font-size:10px;color:#8B949E;text-transform:uppercase;margin-bottom:3px' }, 'Distancia'),
          el('div', { style: 'font-family:monospace;font-size:16px;font-weight:600;color:#3FB950' }, data.distance + ' km')
        ));
        if (data.duration) resultsGrid.appendChild(el('div', {},
          el('div', { style: 'font-size:10px;color:#8B949E;text-transform:uppercase;margin-bottom:3px' }, 'Duración'),
          el('div', { style: 'font-family:monospace;font-size:16px;font-weight:600;color:#388BFD' }, data.duration + ' min')
        ));
        if (data.elevation) resultsGrid.appendChild(el('div', {},
          el('div', { style: 'font-size:10px;color:#8B949E;text-transform:uppercase;margin-bottom:3px' }, 'Desnivel+'),
          el('div', { style: 'font-family:monospace;font-size:16px;font-weight:600;color:#F0883E' }, data.elevation + ' m')
        ));
        if (data.hr) resultsGrid.appendChild(el('div', {},
          el('div', { style: 'font-size:10px;color:#8B949E;text-transform:uppercase;margin-bottom:3px' }, 'FC Media'),
          el('div', { style: 'font-family:monospace;font-size:16px;font-weight:600;color:#A371F7' }, data.hr + ' bpm')
        ));
        if (data.sensaciones) resultsGrid.appendChild(el('div', {},
          el('div', { style: 'font-size:10px;color:#8B949E;text-transform:uppercase;margin-bottom:3px' }, 'Sensaciones'),
          el('div', { style: 'font-family:monospace;font-size:16px;font-weight:600;color:#E6EDF3' }, data.sensaciones + ' / 5')
        ));
        resultsCard.appendChild(resultsGrid);
      }

      // Gym/Rec results
      if ((s.cat === 'gym' || s.cat === 'rec') && data.exercises) {
        data.exercises.forEach(ex => {
          resultsCard.appendChild(el('div', { style: 'padding:8px;background:rgba(163,113,247,0.05);border:1px solid rgba(163,113,247,0.15);border-radius:4px;margin-bottom:8px;font-size:11px' },
            el('div', { style: 'color:#E6EDF3;font-weight:500;margin-bottom:4px' }, ex.name),
            el('div', { style: 'color:#A371F7;font-family:monospace' }, ex.setsCompleted + ' × ' + ex.repsCompleted)
          ));
        });
      }

      if (data.notes) {
        resultsCard.appendChild(el('div', { style: 'padding-top:12px;border-top:1px solid #21262D' },
          el('div', { style: 'font-size:10px;color:#8B949E;text-transform:uppercase;margin-bottom:6px' }, 'Notas'),
          el('div', { style: 'font-size:12px;color:#C9D1D9;line-height:1.5' }, data.notes)
        ));
      }

      wrap.appendChild(resultsCard);
    }
  }

  return wrap;
}

function renderProgressTable() {
  const tableWrap = el('div', { class: 'progress-table-wrap' });
  const table = el('table', { class: 'progress-table' });

  // Header
  const thead = el('thead', {},
    el('tr', {},
      el('th', {}, 'Sem'),
      el('th', {}, 'Vol Real (km)'),
      el('th', {}, 'Vol Teó (km)'),
      el('th', {}, 'Vol Δ%'),
      el('th', {}, 'D+ Real (m)'),
      el('th', {}, 'D+ Teó (m)'),
      el('th', {}, 'D+ Δ%'),
      el('th', {}, 'Ritmo TL (min/km)'),
      el('th', {}, 'Duración TL (h)'),
      el('th', {}, 'Estado'),
      el('th', {}, 'Notas')
    )
  );
  table.appendChild(thead);

  // Data rows
  WEEKS_PLAN.forEach(w => {
    const data = state.progressData[String(w.week)] || {};
    const volReal = parseFloat(data.volReal) || '';
    const elevReal = parseFloat(data.elevReal) || '';
    const volDev = volReal ? calcDeviation(volReal, w.vol) : '';
    const elevDev = elevReal ? calcDeviation(elevReal, w.elev) : '';

    const tr = el('tr', {});
    tr.appendChild(el('td', {}, String(w.week)));

    const volRealInput = el('input', { type: 'number', step: '0.1', value: volReal || '', placeholder: '—' });
    volRealInput.addEventListener('change', () => {
      const v = parseFloat(volRealInput.value);
      if (v < 0) { volRealInput.classList.add('error'); return; }
      volRealInput.classList.remove('error');
      setProgressWeek(w.week, { ...data, volReal: v });
      updateProgressCharts();
    });
    tr.appendChild(el('td', {}, volRealInput));

    tr.appendChild(el('td', { class: 'computed' }, String(w.vol)));

    const volDevCell = el('td', { class: 'computed' + (volDev ? ' ' + getDeviationColor(volDev) : '') });
    volDevCell.textContent = volDev ? volDev + '%' : '—';
    tr.appendChild(volDevCell);

    const elevRealInput = el('input', { type: 'number', step: '10', value: elevReal || '', placeholder: '—' });
    elevRealInput.addEventListener('change', () => {
      const v = parseInt(elevRealInput.value);
      if (v < 0) { elevRealInput.classList.add('error'); return; }
      elevRealInput.classList.remove('error');
      setProgressWeek(w.week, { ...data, elevReal: v });
      updateProgressCharts();
    });
    tr.appendChild(el('td', {}, elevRealInput));

    tr.appendChild(el('td', { class: 'computed' }, String(w.elev)));

    const elevDevCell = el('td', { class: 'computed' + (elevDev ? ' ' + getDeviationColor(elevDev) : '') });
    elevDevCell.textContent = elevDev ? elevDev + '%' : '—';
    tr.appendChild(elevDevCell);

    const ritmoInput = el('input', { type: 'number', step: '0.1', min: '5', max: '10', value: data.ritmo || '', placeholder: '—' });
    ritmoInput.addEventListener('change', () => {
      const v = parseFloat(ritmoInput.value);
      if (v < 0) { ritmoInput.classList.add('error'); return; }
      ritmoInput.classList.remove('error');
      setProgressWeek(w.week, { ...data, ritmo: v });
      updateProgressCharts();
    });
    tr.appendChild(el('td', {}, ritmoInput));

    const duracionInput = el('input', { type: 'number', step: '0.5', min: '0', max: '12', value: data.duracion || '', placeholder: '—' });
    duracionInput.addEventListener('change', () => {
      const v = parseFloat(duracionInput.value);
      if (v < 0) { duracionInput.classList.add('error'); return; }
      duracionInput.classList.remove('error');
      setProgressWeek(w.week, { ...data, duracion: v });
      updateProgressCharts();
    });
    tr.appendChild(el('td', {}, duracionInput));

    const statusSelect = el('select', {});
    statusSelect.innerHTML = '<option value="">—</option><option value="OK">OK</option><option value="Fatiga">Fatiga</option><option value="Lesión">Lesión</option>';
    statusSelect.value = data.status || '';
    statusSelect.addEventListener('change', () => {
      setProgressWeek(w.week, { ...data, status: statusSelect.value });
    });
    tr.appendChild(el('td', {}, statusSelect));

    const notesInput = el('input', { type: 'text', value: data.notes || '', placeholder: '—' });
    notesInput.addEventListener('change', () => {
      setProgressWeek(w.week, { ...data, notes: notesInput.value });
    });
    tr.appendChild(el('td', {}, notesInput));

    table.appendChild(tr);
  });

  tableWrap.appendChild(table);
  return tableWrap;
}

function renderProgress() {
  const done = completedCount();
  const wrap = document.createElement('div');
  wrap.style.paddingBottom = '60px';

  // Calculate current week dynamically
  const today = new Date();
  const planStart = new Date('2026-06-15');
  const daysDiff = Math.floor((today - planStart) / (1000 * 60 * 60 * 24));
  const currentWeek = Math.floor(daysDiff / 7) + 1;
  const currentWeekClamped = Math.max(1, Math.min(52, currentWeek));

  // Find current macrofase
  let currentMacro = 'MF1';
  if (currentWeekClamped >= 7 && currentWeekClamped <= 14) currentMacro = 'MF2';
  else if (currentWeekClamped >= 15 && currentWeekClamped <= 30) currentMacro = 'MF3';
  else if (currentWeekClamped >= 31) currentMacro = 'MF4';

  wrap.appendChild(el('div', { style: 'margin-bottom:24px' },
    el('div', { class: 'page-eyebrow' }, currentMacro + ' · PROGRESO'),
    el('h1', { class: 'page-title' }, 'Progreso'),
    el('div', { class: 'page-sub' }, 'Semana ' + currentWeekClamped + ' de 52 · Plan Ultra 80K')
  ));

  // 1º - Semanas completadas y porcentaje
  let completedWeeks = 0;
  WEEKS_PLAN.forEach(w => {
    const weekData = state.progressData[String(w.week)];
    if (weekData && (weekData.volReal || weekData.elevReal)) {
      completedWeeks++;
    }
  });
  const totalWeeks = 52;
  const percentComplete = ((completedWeeks / totalWeeks) * 100).toFixed(1);

  wrap.appendChild(el('div', { style: 'margin-bottom:24px' },
    el('div', { style: 'display:flex;align-items:center;gap:12px;flex-wrap:wrap' },
      el('div', {},
        el('div', { style: 'font-size:13px;font-weight:600;color:#8B949E;margin-bottom:6px;letter-spacing:0.05em;text-transform:uppercase' }, 'Progreso del plan'),
        el('div', { style: 'font-size:32px;font-weight:700;color:#3FB950;font-family:monospace' }, completedWeeks + ' / ' + totalWeeks)
      ),
      el('div', {},
        el('div', { style: 'font-size:13px;font-weight:600;color:#8B949E;margin-bottom:6px;letter-spacing:0.05em;text-transform:uppercase' }, 'Completado'),
        el('div', { style: 'font-size:32px;font-weight:700;color:#388BFD;font-family:monospace' }, percentComplete + '%')
      )
    )
  ));

  // 2º - Sesiones realizadas
  wrap.appendChild(el('div', { style: 'margin-bottom:24px' },
    el('div', { style: 'font-size:13px;font-weight:600;color:#8B949E;margin-bottom:12px;letter-spacing:0.05em;text-transform:uppercase' }, 'Sesiones esta semana'),
    el('div', { style: 'font-size:28px;font-weight:700;color:#3FB950;font-family:monospace' }, done + ' / 7')
  ));

  // 3º - Programado (2 columnas)
  const weekPlan = WEEKS_PLAN[0];
  wrap.appendChild(el('div', { class: 'stat-grid', style: 'grid-template-columns:repeat(2,1fr);margin-bottom:12px' },
    makeStatCard('Volumen programado', weekPlan.vol + ' km', 'planificado', '#388BFD'),
    makeStatCard('D+ programado', weekPlan.elev + ' m', 'planificado', '#F0883E')
  ));

  // 4º - Real (2 columnas)
  let totalDistance = 0, totalElevation = 0;
  SESSIONS.forEach(s => {
    if (state.completedDays[s.index]) {
      const data = state.workoutData[s.index];
      if (data) {
        totalDistance += parseFloat(data.distance) || 0;
        totalElevation += parseInt(data.elevation) || 0;
      }
    }
  });
  state.extraActivities.forEach(act => {
    totalDistance += parseFloat(act.data.distance) || 0;
    totalElevation += parseInt(act.data.elevation) || 0;
  });

  wrap.appendChild(el('div', { class: 'stat-grid', style: 'grid-template-columns:repeat(2,1fr);margin-bottom:24px' },
    makeStatCard('Volumen real', totalDistance.toFixed(1) + ' km', 'acumulado', '#3FB950'),
    makeStatCard('D+ real', totalElevation + ' m', 'acumulado', '#F0883E')
  ));

  // Get current mesociclo based on current week
  let currentMeso = MESOCICLOS[0];
  for (const m of MESOCICLOS) {
    if (m.weeks.includes(currentWeekClamped)) {
      currentMeso = m;
      break;
    }
  }

  // Calendar + checkpoints
  const g2 = el('div', { class: 'prog-grid2' });

  // Calendar - navigable by month
  const currentDate = new Date();
  const currentDay = currentDate.getDate();
  const currentMonth = currentDate.getMonth();
  const currentYear = currentDate.getFullYear();

  const monthNames = ['ENERO', 'FEBRERO', 'MARZO', 'ABRIL', 'MAYO', 'JUNIO', 'JULIO', 'AGOSTO', 'SEPTIEMBRE', 'OCTUBRE', 'NOVIEMBRE', 'DICIEMBRE'];
  const monthHeader = monthNames[state.calendarMonth] + ' ' + state.calendarYear;

  const cal = el('div', { class: 'cal-wrap' });

  // Header con botones de navegación
  const calHeader = el('div', { style: 'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #21262D' });
  const prevBtn = el('button', { style: 'background:none;border:none;color:#3FB950;cursor:pointer;font-weight:600;padding:4px 8px' }, '← Anterior');
  prevBtn.addEventListener('click', () => {
    if (state.calendarMonth === 5 && state.calendarYear === 2026) return; // No ir antes de junio 2026
    state.calendarMonth--;
    if (state.calendarMonth < 0) { state.calendarMonth = 11; state.calendarYear--; }
    paintProgress();
  });

  const nextBtn = el('button', { style: 'background:none;border:none;color:#3FB950;cursor:pointer;font-weight:600;padding:4px 8px' }, 'Siguiente →');
  nextBtn.addEventListener('click', () => {
    if (state.calendarMonth === 5 && state.calendarYear === 2027) return; // No ir después de junio 2027
    state.calendarMonth++;
    if (state.calendarMonth > 11) { state.calendarMonth = 0; state.calendarYear++; }
    paintProgress();
  });

  calHeader.appendChild(prevBtn);
  calHeader.appendChild(el('div', { style: 'font-size:11px;font-weight:600;color:#E6EDF3' }, monthHeader));
  calHeader.appendChild(nextBtn);
  cal.appendChild(calHeader);

  const dow = el('div', { class: 'cal-dow' });
  ['L','M','X','J','V','S','D'].forEach(d => dow.appendChild(el('div', { class: 'cal-dow-cell' }, d)));
  cal.appendChild(dow);
  const days = el('div', { class: 'cal-days' });

  // Primer día del mes (1)
  const firstDay = new Date(state.calendarYear, state.calendarMonth, 1);
  let dayOfWeekFirstDay = firstDay.getDay(); // 0=domingo, 1=lunes, etc.
  if (dayOfWeekFirstDay === 0) dayOfWeekFirstDay = 7; // Convertir domingo (0) a 7 para sistema lunes-primero
  dayOfWeekFirstDay -= 1; // Ajustar para que lunes sea 0

  // Rellenar con días en blanco del mes anterior si es necesario (lunes = 0)
  for (let i = 0; i < dayOfWeekFirstDay; i++) {
    const dc = el('div', { class: 'cal-day' }, '');
    dc.style.color = 'transparent';
    days.appendChild(dc);
  }

  // Map sessions by date for quick lookup
  const monthNamesAbr = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
  const sessionsByDate = {};
  SESSIONS.forEach(s => {
    const parts = s.fullDate.split(', ')[1]; // Get "15 jun 2026"
    if (parts) sessionsByDate[parts.toLowerCase()] = s;
  });

  // Último día del mes
  const lastDay = new Date(state.calendarYear, state.calendarMonth + 1, 0);
  const lastDayNum = lastDay.getDate();

  // Generar los días del mes actual
  for (let dayNum = 1; dayNum <= lastDayNum; dayNum++) {
    const currDate = new Date(state.calendarYear, state.calendarMonth, dayNum);

    // Buscar si hay una sesión para esta fecha
    let isDone = false;
    let hasSession = false;
    const monthStr = monthNamesAbr[state.calendarMonth];
    const yearStr = state.calendarYear;
    const dateKey = dayNum + ' ' + monthStr + ' ' + yearStr;
    const sessionForDate = sessionsByDate[dateKey];
    if (sessionForDate) {
      hasSession = true;
      isDone = !!state.completedDays[sessionForDate.index];
    }

    const isToday = (currentMonth === currDate.getMonth() && currentYear === currDate.getFullYear() && currentDay === currDate.getDate());
    const isPast = currDate < new Date();

    const dc = el('div', { class: 'cal-day' }, String(dayNum));

    // Color logic: green if done, red if not done but has session and past, transparent otherwise
    let bgColor = 'transparent';
    let textColor = '#E6EDF3';
    if (isToday) {
      bgColor = '#3FB950';
      textColor = '#0D1117';
    } else if (isDone) {
      bgColor = 'rgba(63,185,80,0.2)';
      textColor = '#3FB950';
    } else if (hasSession && isPast) {
      bgColor = 'rgba(240,88,88,0.2)';
      textColor = '#f05858';
    }

    dc.style.background = bgColor;
    dc.style.border = isToday ? '2px solid #52cb63' : '1px solid rgba(255,255,255,0.06)';
    dc.style.color = textColor;
    dc.style.fontWeight = isToday ? '700' : (isDone || (hasSession && isPast) ? '600' : '400');

    // Add click handler to show session details
    if (sessionForDate) {
      dc.style.cursor = 'pointer';
      dc.addEventListener('click', () => openSession(sessionForDate.index));
    }

    days.appendChild(dc);
  }
  cal.appendChild(days);
  g2.appendChild(cal);

  // Checkpoints
  const cpWrap = el('div', { class: 'cp-wrap' }, el('div', { class: 'cp-header' }, 'CHECKPOINTS'));
  const cpList = el('div', { class: 'cp-list' });
  CPS.forEach(cp => {
    const badge = el('div', { class: 'cp-badge' }, cp.id);
    badge.style.border = '1px solid ' + cp.color;
    badge.style.color = cp.color;
    const info = el('div', {},
      el('div', { class: 'cp-name' }, cp.name),
      el('div', { class: 'cp-date' }, cp.date)
    );
    cpList.appendChild(el('div', { class: 'cp-item' }, badge, info));
  });
  cpWrap.appendChild(cpList);
  g2.appendChild(cpWrap);
  wrap.appendChild(g2);

  // Macrocycle totals - updated ranges
  const macrocycleRanges = {
    'MF1': { start: 1, end: 6 },
    'MF2': { start: 7, end: 14 },
    'MF3': { start: 15, end: 30 },
    'MF4': { start: 31, end: 52 }
  };

  // Get current macrocycle based on current week
  const currentMacrocycleKey = currentMacro;
  const currentMacroRange = macrocycleRanges[currentMacrocycleKey];

  let macroDistance = 0, macroElevation = 0, macroExterior = 0, macroStrength = 0;

  for (let week = currentMacroRange.start; week <= currentMacroRange.end; week++) {
    const weekData = state.progressData[String(week)];

    // For week 1, also include current workouts
    if (week === 1) {
      SESSIONS.forEach(s => {
        if (state.completedDays[s.index] && state.workoutData[s.index]) {
          const data = state.workoutData[s.index];
          macroDistance += parseFloat(data.distance) || 0;
          macroElevation += parseInt(data.elevation) || 0;

          if (s.cat === 'zone' || s.cat === 'tl') {
            macroExterior += parseInt(data.duration) || 0;
          } else if (s.cat === 'gym' || s.cat === 'rec') {
            macroStrength += parseInt(data.duration) || 0;
          }
        }
      });

      // Add extra activities for week 1
      state.extraActivities.forEach(act => {
        macroDistance += parseFloat(act.data.distance) || 0;
        macroElevation += parseInt(act.data.elevation) || 0;

        if (act.type === 'zone' || act.type === 'tl') {
          macroExterior += parseInt(act.data.duration) || 0;
        } else if (act.type === 'gym' || act.type === 'rec') {
          macroStrength += parseInt(act.data.duration) || 0;
        }
      });
    } else if (weekData) {
      // For other weeks, use progressData
      macroDistance += parseFloat(weekData.volReal) || 0;
      macroElevation += parseInt(weekData.elevReal) || 0;
      // Note: progressData doesn't distinguish between exterior and strength, so we can't calculate those
    }
  }

  // Convert minutes to hours
  const macroExteriorHours = (macroExterior / 60).toFixed(1);
  const macroStrengthHours = (macroStrength / 60).toFixed(1);

  wrap.appendChild(el('div', { class: 'stat-grid', style: 'grid-template-columns:repeat(4,1fr);margin-bottom:24px;margin-top:24px' },
    makeStatCard('Distancia ' + currentMacrocycleKey, macroDistance.toFixed(1) + ' km', 'macrocycle', '#3FB950'),
    makeStatCard('Desnivel ' + currentMacrocycleKey, macroElevation + ' m', 'macrocycle', '#F0883E'),
    makeStatCard('Entreno exterior ' + currentMacrocycleKey, macroExteriorHours + ' h', 'macrocycle', '#388BFD'),
    makeStatCard('Fuerza/Movilidad ' + currentMacrocycleKey, macroStrengthHours + ' h', 'macrocycle', '#A371F7')
  ));

  // Phases bar - determine which phase is active based on current week
  const ph = el('div', { class: 'phases-wrap' },
    el('div', { class: 'phases-header' }, 'MACROFASES — 52 SEMANAS')
  );
  const bar = el('div', { class: 'phases-bar' });
  PHASES.forEach(p => {
    const phaseIsActive = p.id === currentMacro;
    const seg = document.createElement('div');
    seg.style.cssText = 'flex:' + p.r + ';background:' + (phaseIsActive ? p.color : 'rgba(255,255,255,0.05)');
    bar.appendChild(seg);
  });
  ph.appendChild(bar);
  const pl = el('div', { class: 'phases-list' });
  PHASES.forEach(p => {
    const phaseIsActive = p.id === currentMacro;
    const row = el('div', { class: 'phase-row' });
    const dot = el('div', { class: 'phase-dot' });
    dot.style.background = p.color;
    const pid = el('div', { class: 'phase-id', style: 'color:' + p.color }, p.id);
    const pname = el('div', { class: 'phase-name', style: 'color:' + (phaseIsActive ? '#E6EDF3' : '#8B949E') }, p.name);
    row.append(dot, pid, pname);
    if (phaseIsActive) row.appendChild(el('span', { class: 'phase-active' }, 'ACTIVA'));
    row.appendChild(el('span', { class: 'phase-weeks' }, 'Sem ' + p.weeks));
    row.appendChild(el('span', { class: 'phase-dates' }, '· ' + p.dates));
    pl.appendChild(row);
  });
  ph.appendChild(pl);
  wrap.appendChild(ph);

  // Control buttons
  const btnExport = el('button', { class: 'control-btn primary' }, '📥 Exportar CSV');
  btnExport.addEventListener('click', exportToCSV);
  const btnReload = el('button', { class: 'control-btn' }, '🔄 Recargar tabla');
  btnReload.addEventListener('click', () => {
    const container = document.getElementById('progDataContainer');
    container.innerHTML = '';
    container.appendChild(renderProgressTable());
  });
  const btnClear = el('button', { class: 'control-btn danger' }, '🗑 Limpiar datos');
  btnClear.addEventListener('click', clearProgressData);
  wrap.appendChild(el('div', { class: 'control-buttons' }, btnExport, btnReload, btnClear));

  // Progress data section
  const progSection = el('div', { style: 'margin-top:32px' });
  progSection.appendChild(el('div', { style: 'font-size:13px;font-weight:600;color:#8B949E;margin-bottom:16px;letter-spacing:0.05em;text-transform:uppercase' }, 'Análisis Semanal — 52 Semanas'));

  const progDataContainer = el('div', { id: 'progDataContainer' });
  progDataContainer.appendChild(renderProgressTable());
  progSection.appendChild(progDataContainer);

  // Charts section
  const chartsSection = el('div', { style: 'margin-top:32px;margin-bottom:32px' });

  // Macrocycle header and navigation
  chartsSection.appendChild(el('div', { style: 'display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px' },
    el('div', { style: 'font-size:13px;font-weight:600;color:#8B949E;letter-spacing:0.05em;text-transform:uppercase' }, 'Gráficos de Análisis'),
    el('div', { style: 'display:flex;gap:8px;flex-wrap:wrap' },
      ...['MF1', 'MF2', 'MF3', 'MF4'].map(mf => {
        const btn = el('button', { class: 'control-btn' + (selectedMacrocycle === mf ? ' primary' : ''), style: mf === 'MF1' ? 'background:#3FB950;color:#0D1117;border-color:#3FB950' : '' });
        btn.textContent = mf;
        btn.addEventListener('click', () => {
          document.querySelectorAll('[data-mf-btn]').forEach(b => {
            b.style.background = 'transparent';
            b.style.color = '#E6EDF3';
            b.style.borderColor = '#21262D';
            b.classList.remove('primary');
          });
          btn.style.background = '#3FB950';
          btn.style.color = '#0D1117';
          btn.classList.add('primary');
          updateProgressCharts(mf);
        });
        btn.setAttribute('data-mf-btn', mf);
        return btn;
      })
    )
  ));

  // Chart 1: Volumen
  const chart1Div = el('div', { class: 'chart-container' });
  chart1Div.appendChild(el('div', { class: 'chart-title' }, '1. Volumen: Real vs Teórico (km)'));
  const canvasVol = el('canvas', { id: 'chartVolume' });
  chart1Div.appendChild(canvasVol);
  chartsSection.appendChild(chart1Div);

  // Chart 2: Desnivel
  const chart2Div = el('div', { class: 'chart-container' });
  chart2Div.appendChild(el('div', { class: 'chart-title' }, '2. Desnivel: Real vs Teórico (m)'));
  const canvasElev = el('canvas', { id: 'chartElevation' });
  chart2Div.appendChild(canvasElev);
  chartsSection.appendChild(chart2Div);

  // Chart 3: Ritmo
  const chart3Div = el('div', { class: 'chart-container' });
  chart3Div.appendChild(el('div', { class: 'chart-title' }, '3. Ritmo Medio en Tirada Larga (min/km)'));
  const canvasRitmo = el('canvas', { id: 'chartRitmo' });
  chart3Div.appendChild(canvasRitmo);
  chartsSection.appendChild(chart3Div);

  // Chart 4: Duración
  const chart4Div = el('div', { class: 'chart-container' });
  chart4Div.appendChild(el('div', { class: 'chart-title' }, '4. Duración Tirada Larga (horas)'));
  const canvasDuracion = el('canvas', { id: 'chartDuracion' });
  chart4Div.appendChild(canvasDuracion);
  chartsSection.appendChild(chart4Div);

  wrap.appendChild(chartsSection);

  // Initialize charts after a short delay to ensure DOM is ready
  setTimeout(() => {
    updateProgressCharts();
  }, 100);

  return wrap;
}

let progressCharts = {};
let selectedMacrocycle = 'MF1'; // Track selected macrocycle for charts

function updateProgressCharts(macrocycle = selectedMacrocycle) {
  selectedMacrocycle = macrocycle;
  // Destroy existing charts
  Object.values(progressCharts).forEach(c => c?.destroy?.());
  progressCharts = {};

  // Get week range for selected macrocycle
  const macrocycleRanges = {
    'MF1': { start: 1, end: 12 },
    'MF2': { start: 13, end: 28 },
    'MF3': { start: 29, end: 44 },
    'MF4': { start: 45, end: 52 }
  };
  const range = macrocycleRanges[macrocycle] || macrocycleRanges['MF1'];
  const filteredWeeks = WEEKS_PLAN.filter(w => w.week >= range.start && w.week <= range.end);

  // Calculate current week volume from completed workouts (sum all sessions)
  let weekVolume = 0, weekElev = 0;
  for (let i = 0; i < 7; i++) {
    if (state.workoutData[i]) {
      const d = state.workoutData[i];
      weekVolume += parseFloat(d.distance) || 0;
      weekElev += parseInt(d.elevation) || 0;
    }
  }

  // Add extra activities to volume/elevation
  state.extraActivities.forEach(act => {
    weekVolume += parseFloat(act.data.distance) || 0;
    weekElev += parseInt(act.data.elevation) || 0;
  });

  // Calculate TL (Tirada Larga) metrics - ONLY from session index 6 (Sunday TL)
  let tlDuration = 0, tlRitmo = null;
  if (state.workoutData[6]) {
    const tlData = state.workoutData[6];
    tlDuration = parseInt(tlData.duration) || 0;
    if (tlData.distance && tlData.duration) {
      const ritmoDecimal = tlData.duration / tlData.distance;
      tlRitmo = parseFloat(ritmoDecimal.toFixed(2));
    }
  }

  const volReal = filteredWeeks.map((w, idx) => {
    if (w.week === 1) return weekVolume || null;
    return parseFloat(state.progressData[String(w.week)]?.volReal) || null;
  });
  const volTeor = filteredWeeks.map(w => w.vol);
  const elevReal = filteredWeeks.map((w, idx) => {
    if (w.week === 1) return weekElev || null;
    return parseFloat(state.progressData[String(w.week)]?.elevReal) || null;
  });
  const elevTeor = filteredWeeks.map(w => w.elev);
  const ritmo = filteredWeeks.map((w, idx) => {
    if (w.week === 1) return tlRitmo;
    return parseFloat(state.progressData[String(w.week)]?.ritmo) || null;
  });
  const duracion = filteredWeeks.map((w, idx) => {
    if (w.week === 1) return tlDuration ? (tlDuration / 60) : null;
    return parseFloat(state.progressData[String(w.week)]?.duracion) || null;
  });
  const duracionTeor = filteredWeeks.map(w => {
    if (w.week >= 45) return 2;
    if (w.week >= 29) return 3.5;
    if (w.week >= 13) return 3;
    return 2.5;
  });
  const weeks = filteredWeeks.map(w => 'S' + w.week);

  const chartOpts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#8B949E', font: { size: 11 } } } },
    scales: { y: { grid: { color: 'rgba(33,38,45,0.5)' }, ticks: { color: '#8B949E' } }, x: { grid: { color: 'rgba(33,38,45,0.5)' }, ticks: { color: '#8B949E' } } }
  };

  // Chart 1: Volumen
  const ctxVol = document.getElementById('chartVolume');
  if (ctxVol) {
    progressCharts.vol = new Chart(ctxVol, {
      type: 'line',
      data: {
        labels: weeks,
        datasets: [
          { label: 'Teórico', data: volTeor, borderColor: '#388BFD', backgroundColor: 'rgba(56,139,253,0.1)', tension: 0.3 },
          { label: 'Real', data: volReal, borderColor: '#F0883E', backgroundColor: 'rgba(240,136,62,0.1)', tension: 0.3 }
        ]
      },
      options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, max: 100 } } }
    });
  }

  // Chart 2: Desnivel (bar)
  const ctxElev = document.getElementById('chartElevation');
  if (ctxElev) {
    progressCharts.elev = new Chart(ctxElev, {
      type: 'bar',
      data: {
        labels: weeks,
        datasets: [
          { label: 'Teórico', data: elevTeor, backgroundColor: 'rgba(56,139,253,0.6)', borderColor: '#388BFD' },
          { label: 'Real', data: elevReal, backgroundColor: 'rgba(240,136,62,0.6)', borderColor: '#F0883E' }
        ]
      },
      options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, max: 6500 } } }
    });
  }

  // Chart 3: Ritmo
  const ctxRitmo = document.getElementById('chartRitmo');
  if (ctxRitmo) {
    progressCharts.ritmo = new Chart(ctxRitmo, {
      type: 'line',
      data: {
        labels: weeks,
        datasets: [
          { label: 'Ritmo Tirada Larga', data: ritmo, borderColor: '#A371F7', backgroundColor: 'rgba(163,113,247,0.1)', tension: 0.3, pointRadius: 4 }
        ]
      },
      options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, min: 6, max: 8.5 } } }
    });
  }

  // Chart 4: Duración
  const ctxDuracion = document.getElementById('chartDuracion');
  if (ctxDuracion) {
    progressCharts.duracion = new Chart(ctxDuracion, {
      type: 'bar',
      data: {
        labels: weeks,
        datasets: [
          { label: 'Teórica', data: duracionTeor, backgroundColor: 'rgba(56,139,253,0.6)', borderColor: '#388BFD' },
          { label: 'Real', data: duracion, backgroundColor: 'rgba(240,136,62,0.6)', borderColor: '#F0883E' }
        ]
      },
      options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, max: 6.5 } } }
    });
  }
}

    ));

    // Date

    // Mesociclo badge

    ));

    ));

    ));

    ));

      el('div', { style: 'font-size:12px;color:#E6EDF3;line-height:1.4;margin-bottom:8px' }, race.objetivo),
      el('div', { style: 'font-size:10px;color:#8B949E;text-transform:uppercase;margin-bottom:4px;font-weight:600' }, 'Criterio de Éxito'),

      ));
      realGrid.appendChild(el('div', {},
        el('div', { style: 'font-size:9px;color:#8B949E;text-transform:uppercase' }, 'Estado'),
        el('div', { style: 'font-size:13px;font-weight:600;color:' + (data.time <= race.timeMin ? '#3FB950' : data.time <= race.timeMin * 1.1 ? '#F0883E' : '#f05858') },
          data.time <= race.timeMin ? '✓ Cumplido' : data.time <= race.timeMin * 1.1 ? '≈ En límite' : '✗ Superado')
      ));
      card.appendChild(realGrid);

      if (data.notes) {
        card.appendChild(el('div', { style: 'font-size:11px;color:#C9D1D9;padding-top:12px;border-top:1px solid #21262D' }, data.notes));

        state.selectedRace = race.id;
        state.showingRaceForm = true;
        const modal = renderRaceForm(race);
        document.body.appendChild(modal);
      });
      card.appendChild(btn);
    }

    racesGrid.appendChild(card);
  });

  wrap.appendChild(racesGrid);
  return wrap;
}

function renderRaceForm(race) {
  const modal = el('div', { style: 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999' });
  const card = el('div', { style: 'background:#0D1117;border:1px solid #21262D;border-radius:8px;padding:24px;max-width:500px;max-height:90vh;overflow-y:auto;width:90%' });

  card.appendChild(el('h2', { style: 'font-size:18px;font-weight:700;color:#E6EDF3;margin-bottom:20px' }, '📋 Completar: ' + race.name));

  const form = el('div', {});

  // Time
  const timeInput = el('input', { type: 'number', placeholder: 'ej: 390', style: 'width:100%;padding:10px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-size:12px;margin-bottom:12px' });
  form.appendChild(el('div', { style: 'margin-bottom:16px' },
    el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:6px;text-transform:uppercase' }, 'Tiempo (minutos)'),
    timeInput
  ));

  // Ritmo
  const ritmoInput = el('input', { type: 'number', step: '0.1', placeholder: 'ej: 6.5', style: 'width:100%;padding:10px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-size:12px;margin-bottom:12px' });
  form.appendChild(el('div', { style: 'margin-bottom:16px' },
    el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:6px;text-transform:uppercase' }, 'Ritmo (min/km)'),
    ritmoInput
  ));

  // Elevation
  const elevationInput = el('input', { type: 'number', placeholder: 'ej: 1200', style: 'width:100%;padding:10px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-size:12px;margin-bottom:12px' });
  form.appendChild(el('div', { style: 'margin-bottom:16px' },
    el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:6px;text-transform:uppercase' }, 'Desnivel Real (m)'),
    elevationInput
  ));

  // Sensaciones
  const sensacionesInput = el('input', { type: 'number', min: '1', max: '5', placeholder: 'ej: 4', style: 'width:100%;padding:10px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-size:12px;margin-bottom:12px' });
  form.appendChild(el('div', { style: 'margin-bottom:16px' },
    el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:6px;text-transform:uppercase' }, 'Sensaciones (1-5)'),
    sensacionesInput
  ));

  // Notes
  const notesInput = el('textarea', { placeholder: 'Observaciones, cómo te sentiste, etc.', style: 'width:100%;padding:10px;background:#0D1117;border:1px solid #21262D;border-radius:4px;color:#E6EDF3;font-size:12px;min-height:60px;resize:vertical;margin-bottom:16px' });
  form.appendChild(el('div', { style: 'margin-bottom:16px' },
    el('label', { style: 'font-size:11px;color:#8B949E;display:block;margin-bottom:6px;text-transform:uppercase' }, 'Notas'),
    notesInput
  ));

  card.appendChild(form);

  // Buttons
  const btnGroup = el('div', { style: 'display:flex;gap:8px' });
  const saveBtn = el('button', { type: 'button', class: 'complete-btn undone', style: 'flex:1' });
  saveBtn.textContent = '✓ Guardar Resultado';
  saveBtn.addEventListener('click', () => {
    const time = parseInt(timeInput.value);
    const ritmo = parseFloat(ritmoInput.value);
    if (!time || !ritmo) {
      alert('Por favor completa tiempo y ritmo');
      return;
    }
    state.raceData[race.id] = {
      time,
      ritmo,
      elevation: parseInt(elevationInput.value) || 0,
      sensaciones: parseInt(sensacionesInput.value) || 0,
      notes: notesInput.value
    };
    saveRaceData();
    state.showingRaceForm = false;
    modal.remove();
    paintRaces();
  });

  const cancelBtn = el('button', { type: 'button', class: 'complete-btn done-state', style: 'flex:1' });
  cancelBtn.textContent = 'Cancelar';
  cancelBtn.addEventListener('click', () => {
    state.showingRaceForm = false;
    modal.remove();
  });

  btnGroup.appendChild(saveBtn);
  btnGroup.appendChild(cancelBtn);
  card.appendChild(btnGroup);
  modal.appendChild(card);

  return modal;
}

// ─── ROUTING ─────────────────────────────────────────────────────────────────
// ─── PLANIFICACIÓN ───────────────────────────────────────────────────────────
function setView(view) {
  state.view = view;
  state.selectedDay = null;
  document.getElementById('view-dashboard').style.display = view === 'dashboard' ? '' : 'none';
  document.getElementById('view-session').style.display   = view === 'session'   ? '' : 'none';
  document.getElementById('view-progress').style.display  = view === 'progress'  ? '' : 'none';
  document.getElementById('view-races').style.display     = view === 'races'     ? '' : 'none';
  document.getElementById('btn-dashboard').classList.toggle('active', view === 'dashboard' || view === 'session');
  document.getElementById('btn-progress').classList.toggle('active', view === 'progress');
  document.getElementById('btn-races').classList.toggle('active', view === 'races');
  if (view === 'dashboard') paintDashboard();
  if (view === 'progress')  paintProgress();
  if (view === 'races')     paintRaces();
  localStorage.setItem('trailapp_view', view);
}

function openSession(idx) {
  state.view = 'session';
  state.selectedDay = idx;
  document.getElementById('view-dashboard').style.display = 'none';
  document.getElementById('view-progress').style.display  = 'none';
  const v = document.getElementById('view-session');
  v.style.display = '';
  v.innerHTML = '';
  v.classList.remove('fade-in');
  void v.offsetWidth;
  v.classList.add('fade-in');
  v.appendChild(renderSession(idx));
  document.getElementById('btn-dashboard').classList.add('active');
  document.getElementById('btn-progress').classList.remove('active');
}

function paintDashboard() {
  const v = document.getElementById('view-dashboard');
  v.innerHTML = '';
  v.classList.remove('fade-in');
  void v.offsetWidth;
  v.classList.add('fade-in');
  v.appendChild(renderDashboard());
  updateUsernameDisplay();
}

function paintProgress() {
  const v = document.getElementById('view-progress');
  v.innerHTML = '';
  v.classList.remove('fade-in');
  void v.offsetWidth;
  v.classList.add('fade-in');
  v.appendChild(renderProgress());
  setTimeout(() => updateProgressCharts(), 200);
}

function paintRaces() {
  const v = document.getElementById('view-races');
  v.innerHTML = '';
  v.classList.remove('fade-in');
  void v.offsetWidth;
  v.classList.add('fade-in');
  v.appendChild(renderRaces());
}

// ─── LOGIN FUNCTIONS ────────────────────────────────────────────────────────
function toggleLoginModal() {
  const modal = document.getElementById('login-modal');
  if (modal.style.display === 'none' || !modal.style.display) {
    modal.style.display = 'flex';
    document.getElementById('username-input').value = state.username || '';
    document.getElementById('username-input').focus();
  } else {
    modal.style.display = 'none';
  }
}

function applyUsername() {
  const username = document.getElementById('username-input').value.trim().toLowerCase();
  if (!username) {
    alert('Por favor, introduce un nombre de usuario');
    return;
  }
  if (username.length < 3) {
    alert('El nombre debe tener al menos 3 caracteres');
    return;
  }

  // Clear old data
  localStorage.removeItem('trailapp_completed');
  localStorage.removeItem('progreso_ultra_2026');
  localStorage.removeItem('trailapp_extras');
  localStorage.removeItem('trailapp_races');
  localStorage.removeItem('trailapp_workouts');

  state.username = username;
  state.completedDays = {};
  state.workoutData = {};
  state.progressData = {};
  state.raceData = {};
  state.extraActivities = [];

  localStorage.setItem('trailapp_username', username);
  updateUsernameDisplay();

  alert('Conectando como ' + username + '...');
  loadFromSupabase().then(() => {
    paintDashboard();
    paintProgress();
    toggleLoginModal();
  });
}

function updateUsernameDisplay() {
  if (state.username) {
    const elem = document.getElementById('username-display');
    if (elem) {
      elem.textContent = state.username;
    }
  }
}

async function initializeSupabase() {
  // Load username from localStorage if exists
  if (!state.username) {
    state.username = localStorage.getItem('trailapp_username');
  }

  // Update display
  updateUsernameDisplay();

  // If no username, show login modal
  if (!state.username) {
    toggleLoginModal();
    return;
  }

  // Load from cloud, then paint UI
  await loadFromSupabase();

  paintDashboard();
  paintProgress();
  setView(localStorage.getItem('trailapp_view') || 'dashboard');

  // Sync to cloud every 30 seconds (faster sync)
  setInterval(syncToSupabase, 30000);

  // Load from cloud every 60 seconds
  setInterval(async () => {
    await loadFromSupabase();
    paintDashboard();
    paintProgress();
  }, 60000);

  // Also reload when page regains focus
  window.addEventListener('focus', async () => {
    await loadFromSupabase();
    paintDashboard();
    paintProgress();
  });

  // Force sync on beforeunload to ensure data is saved before leaving
  window.addEventListener('beforeunload', () => {
    syncToSupabase();
  });
}
