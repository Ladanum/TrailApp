<!DOCTYPE html>
<!-- PLANNING TAB COMPLETELY REMOVED - JUNE 21 2026 - NO PLAN BUTTON, NO PLAN VIEW - CACHE FIX v2 -->
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3FB950">
<meta name="description" content="App de entrenamiento de trail running con sincronización en línea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrailApp">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%233FB950' width='180' height='180'/><text x='90' y='100' dominant-baseline='middle' text-anchor='middle' font-family='system-ui, -apple-system, sans-serif' font-size='90' font-weight='800' fill='white'>T</text></svg>">
<title>TrailApp — Ultra 80K</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
#btn-plan, [onclick*="plan"], .planificacion { display: none !important; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #f5f5f5; overflow: hidden; }
body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; color: #1a1a1a; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
button { cursor: pointer; font-family: inherit; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.fade-in { animation: fadeIn 0.18s ease; }

.mono { font-family: 'JetBrains Mono', 'Fira Mono', 'Consolas', monospace; }

#app { display: flex; height: 100vh; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: 220px; flex-shrink: 0;
  background: #f5f5f5;
  border-right: 1px solid #e0e0e0;
  display: flex; flex-direction: column;
  transition: width 0.2s;
}
@media (max-width: 860px) {
  #sidebar { width: 56px; overflow-y: auto; }
  .sb-label { display: none !important; }
}

.sb-brand {
  padding: 22px 20px 18px;
  border-bottom: 1px solid #e0e0e0;
}
.sb-app-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.22em; color: #3FB950;
  font-weight: 600; text-transform: uppercase; margin-bottom: 2px;
}
.sb-race-name { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 3px; color: #0D1117; }
.sb-race-sub { font-family: monospace; font-size: 10px; color: #3FB950; }

.sb-nav { padding: 10px 0; flex: 1; display: flex; flex-direction: column; gap: 1px; }
.nav-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px 9px 18px;
  background: transparent; border: none;
  border-left: 2px solid transparent;
  color: #666666; width: 100%; text-align: left;
  font-size: 13px; font-weight: 400;
  transition: background 0.1s, color 0.1s;
}
.nav-btn.active {
  background: rgba(63,185,80,0.1);
  border-left-color: #3FB950;
  color: #0D1117; font-weight: 600;
}
.nav-btn:hover:not(.active) { background: rgba(0,0,0,0.05); color: #333333; }
.nav-btn svg { flex-shrink: 0; }

.sb-countdown {
  padding: 16px 20px;
  border-top: 1px solid #e0e0e0;
}
.sb-countdown-label {
  font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase;
  color: #666666; margin-bottom: 5px; font-weight: 500;
}
.sb-countdown-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 38px; font-weight: 600; color: #3FB950;
  line-height: 1; letter-spacing: -0.03em;
}
.sb-countdown-date { font-family: monospace; font-size: 10px; color: #666666; margin-top: 6px; }

/* MAIN */
#main { flex: 1; overflow-y: auto; padding: 32px 36px; min-width: 0; }
@media (max-width: 768px) {
  #main { padding: 16px 12px; }
}

/* CARDS */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
@media (max-width: 768px) {
  .stat-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
}
@media (max-width: 480px) {
  .stat-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
}
.stat-card {
  background: #0D1117; border: 1px solid #21262D;
  border-radius: 6px; padding: 14px;
}
.stat-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.11em;
  color: #8B949E; margin-bottom: 4px; font-weight: 600;
}
@media (max-width: 480px) {
  .stat-label { font-size: 8px; }
}
.stat-val {
  font-family: monospace; font-size: 20px; font-weight: 600;
}
@media (max-width: 480px) {
  .stat-val { font-size: 16px; }
}
.stat-sub { font-size: 10px; color: #8B949E; margin-top: 2px; }

/* SESSION CARDS */
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(128px, 1fr));
  gap: 8px; min-width: 100%;
}
@media (max-width: 768px) {
  .week-grid {
    grid-template-columns: repeat(7, minmax(100px, 1fr));
    gap: 6px;
    min-width: 750px;
  }
}
@media (max-width: 480px) {
  .week-grid {
    grid-template-columns: repeat(7, minmax(80px, 1fr));
    gap: 4px;
    min-width: 620px;
  }
}
.week-scroll { overflow-x: auto; margin-bottom: 20px; }
.session-card {
  background: #0D1117; border: 1px solid #21262D;
  border-radius: 8px; padding: 12px;
  cursor: pointer; display: flex; flex-direction: column;
  min-height: 168px;
  transition: opacity 0.15s, border-color 0.15s, background 0.15s;
}
@media (max-width: 768px) {
  .session-card {
    min-height: 130px;
    padding: 10px;
  }
}
@media (max-width: 480px) {
  .session-card {
    min-height: 100px;
    padding: 8px;
  }
}
.session-card:hover { opacity: 0.82; }
.session-card.today { border: 1.5px solid #3FB950; }
.session-card.done { background: rgba(63,185,80,0.04); border-color: rgba(63,185,80,0.3); }

.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.card-day { font-family: monospace; font-size: 10px; font-weight: 600; color: #8B949E; letter-spacing: 0.07em; }
.card-date { font-family: monospace; font-size: 10px; color: #8B949E; margin-bottom: 9px; }
.card-desc { font-size: 11px; color: #8B949E; margin-top: 8px; line-height: 1.45; flex: 1; }
.card-bottom { margin-top: 8px; display: flex; justify-content: space-between; align-items: center; gap: 4px; flex-wrap: wrap; }
.card-dur { font-family: monospace; font-size: 11px; color: #E6EDF3; font-weight: 500; }

/* BADGE */
.badge {
  border-radius: 4px; padding: 2px 8px; font-size: 10px;
  font-weight: 600; letter-spacing: 0.06em; display: inline-block;
  font-family: monospace;
}
.badge-zone  { background: rgba(56,139,253,0.14);  color: #388BFD; border: 1px solid rgba(56,139,253,0.28); }
.badge-gym   { background: rgba(163,113,247,0.14); color: #A371F7; border: 1px solid rgba(163,113,247,0.28); }
.badge-tl    { background: rgba(63,185,80,0.14);   color: #3FB950; border: 1px solid rgba(63,185,80,0.28); }
.badge-rec   { background: rgba(139,148,158,0.14); color: #8B949E; border: 1px solid rgba(139,148,158,0.28); }
.badge-quality { background: rgba(240,136,62,0.14); color: #F0883E; border: 1px solid rgba(240,136,62,0.28); }

.alert-chip {
  font-size: 9px; color: #F0883E;
  background: rgba(240,136,62,0.1); border: 1px solid rgba(240,136,62,0.2);
  border-radius: 3px; padding: 2px 5px; white-space: nowrap;
}

/* DETAIL VIEW */
.back-btn {
  background: none; border: none; color: #8B949E;
  font-size: 13px; padding: 0; margin-bottom: 20px;
  display: flex; align-items: center; gap: 6px;
}
.back-btn:hover { color: #C9D1D9; }

.detail-wrap { max-width: 680px; }
@media (max-width: 480px) {
  .detail-wrap { max-width: 100%; }
}
.detail-date { font-family: monospace; font-size: 10px; color: #8B949E; letter-spacing: 0.13em; margin-bottom: 8px; text-transform: uppercase; }
.detail-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
@media (max-width: 480px) {
  .detail-meta { gap: 6px; font-size: 11px; }
}
.detail-title { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.4; margin-bottom: 16px; }
@media (max-width: 480px) {
  .detail-title { font-size: 16px; margin-bottom: 12px; }
}

.info-card {
  background: #0D1117; border: 1px solid #21262D;
  border-radius: 8px; padding: 16px; margin-bottom: 12px;
}
.info-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.13em; color: #8B949E; margin-bottom: 6px; font-weight: 600; }
.info-zone { font-family: monospace; font-size: 18px; font-weight: 600; color: #388BFD; margin-bottom: 10px; }
.info-desc { font-size: 13px; color: #8B949E; line-height: 1.65; }

.block-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
.block-card { background: #0D1117; border: 1px solid #21262D; border-radius: 8px; padding: 16px; }
.block-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.block-id {
  width: 24px; height: 24px;
  background: rgba(163,113,247,0.15); border: 1px solid rgba(163,113,247,0.25);
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  font-family: monospace; font-size: 11px; font-weight: 700; color: #A371F7; flex-shrink: 0;
}
.block-name { font-size: 13px; font-weight: 600; }
.ex-table { display: grid; grid-template-columns: 1fr 40px 56px; }
.ex-th {
  font-size: 9px; text-transform: uppercase; color: #8B949E;
  font-weight: 600; letter-spacing: 0.1em; padding-bottom: 8px;
}
.ex-th:not(:first-child) { text-align: right; }
.ex-cell { font-size: 13px; color: #E6EDF3; padding: 9px 0; border-top: 1px solid #21262D; }
.ex-sets { font-family: monospace; font-size: 12px; color: #A371F7; padding: 9px 0; border-top: 1px solid #21262D; text-align: right; }
.ex-reps { font-family: monospace; font-size: 12px; color: #8B949E; padding: 9px 0; border-top: 1px solid #21262D; text-align: right; }

.complete-btn {
  width: 100%; padding: 13px; border-radius: 8px;
  font-size: 14px; font-weight: 700; letter-spacing: 0.02em;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  border: 1px solid transparent;
}
@media (max-width: 480px) {
  .complete-btn {
    padding: 10px;
    font-size: 12px;
  }
}
.complete-btn.undone { background: #3FB950; border: 1px solid #3FB950; color: #0D1117; }
.complete-btn.undone:hover { background: #52cb63; }
.complete-btn.done-state { background: transparent; border: 1px solid rgba(63,185,80,0.5); color: #3FB950; }
.complete-btn.done-state:hover { background: rgba(63,185,80,0.05); }

/* PROGRESS */
.prog-grid4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 20px; }
@media (max-width: 768px) {
  .prog-grid4 { grid-template-columns: repeat(2,1fr); gap: 6px; }
}
@media (max-width: 480px) {
  .prog-grid4 { grid-template-columns: 1fr; gap: 6px; }
}
.prog-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
@media (max-width: 480px) {
  .prog-grid2 { grid-template-columns: 1fr; gap: 8px; }
}

.cal-wrap { background: #0D1117; border: 1px solid #21262D; border-radius: 8px; padding: 16px; }
.cal-header { font-size: 9px; text-transform: uppercase; letter-spacing: 0.13em; color: #8B949E; margin-bottom: 12px; font-weight: 600; }
.cal-dow { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-bottom: 4px; }
.cal-dow-cell { font-family: monospace; font-size: 9px; color: #8B949E; text-align: center; padding: 2px 0; }
.cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 3px; font-family: monospace; font-size: 10px;
  border: 1px solid transparent;
}

.cp-wrap { background: #0D1117; border: 1px solid #21262D; border-radius: 8px; padding: 16px; }
.cp-header { font-size: 9px; text-transform: uppercase; letter-spacing: 0.13em; color: #8B949E; margin-bottom: 14px; font-weight: 600; }
.cp-list { display: flex; flex-direction: column; gap: 14px; }
.cp-item { display: flex; align-items: flex-start; gap: 10px; }
.cp-badge {
  min-width: 34px; height: 22px; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: monospace; font-size: 8px; font-weight: 700;
  flex-shrink: 0; letter-spacing: 0.04em;
}
.cp-name { font-size: 12px; font-weight: 500; line-height: 1.3; }
.cp-date { font-family: monospace; font-size: 10px; color: #8B949E; margin-top: 2px; }

.phases-wrap { background: #0D1117; border: 1px solid #21262D; border-radius: 8px; padding: 16px; }
.phases-header { font-size: 9px; text-transform: uppercase; letter-spacing: 0.13em; color: #8B949E; margin-bottom: 12px; font-weight: 600; }
.phases-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; gap: 2px; margin-bottom: 14px; }
.phases-list { display: flex; flex-direction: column; gap: 10px; }
.phase-row { display: flex; align-items: center; gap: 10px; }
.phase-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.phase-id { font-family: monospace; font-size: 10px; font-weight: 600; width: 36px; }
.phase-name { font-size: 12px; flex: 1; }
.phase-active { font-size: 9px; color: #3FB950; background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.2); border-radius: 3px; padding: 1px 5px; letter-spacing: 0.05em; }
.phase-weeks { font-family: monospace; font-size: 10px; color: #8B949E; }
.phase-dates { font-size: 10px; color: #8B949E; }

/* PROGRESS DATA TABLE */
.progress-table-wrap { background: #0D1117; border: 1px solid #21262D; border-radius: 8px; padding: 16px; margin-bottom: 20px; overflow-x: auto; }
.progress-table { width: 100%; border-collapse: collapse; min-width: 1400px; }
.progress-table th { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: #8B949E; font-weight: 600; padding: 10px; border-bottom: 1px solid #21262D; text-align: left; }
.progress-table td { font-size: 12px; padding: 10px; border-bottom: 1px solid #21262D; color: #E6EDF3; }
.progress-table input { background: #0D1117; border: 1px solid #21262D; color: #E6EDF3; padding: 6px; border-radius: 4px; font-size: 12px; font-family: monospace; width: 100%; }
.progress-table input:focus { outline: none; border-color: #388BFD; box-shadow: 0 0 4px rgba(56,139,253,0.2); }
.progress-table select { background: #0D1117; border: 1px solid #21262D; color: #E6EDF3; padding: 6px; border-radius: 4px; font-size: 12px; width: 100%; }
.progress-table select:focus { outline: none; border-color: #388BFD; }
.progress-table .computed { color: #8B949E; cursor: not-allowed; background: rgba(139,148,158,0.05); }
.progress-table .error { background: rgba(240,88,88,0.1) !important; border-color: #f05858 !important; }
.progress-table .warning { background: rgba(240,136,62,0.1) !important; border-color: #F0883E !important; }
.progress-table .success { background: rgba(63,185,80,0.1) !important; border-color: #3FB950 !important; }

.chart-container { position: relative; height: 300px; margin-bottom: 24px; background: #0D1117; border: 1px solid #21262D; border-radius: 8px; padding: 16px; }
.chart-title { font-size: 12px; font-weight: 600; color: #E6EDF3; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }

.control-buttons { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.control-btn { background: #0D1117; border: 1px solid #21262D; color: #E6EDF3; padding: 10px 16px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.control-btn:hover { background: #21262D; border-color: #30363d; }
.control-btn.primary { background: #3FB950; border: 1px solid #3FB950; color: #0D1117; }
.control-btn.primary:hover { background: #52cb63; }
.control-btn.danger { background: rgba(240,88,88,0.15); border: 1px solid rgba(240,88,88,0.3); color: #f05858; }
.control-btn.danger:hover { background: rgba(240,88,88,0.25); }

/* PLAN BAR */
.plan-bar { background: #0D1117; border: 1px solid #21262D; border-radius: 6px; padding: 11px 14px; margin-bottom: 18px; }
.plan-bar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.plan-bar-label { font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; color: #8B949E; font-weight: 600; }
.plan-bar-sem { font-family: monospace; font-size: 10px; color: #8B949E; }
.plan-bar-track { height: 3px; background: #21262D; border-radius: 2px; margin-bottom: 7px; }
.plan-bar-fill { height: 3px; width: 1.9%; background: #3FB950; border-radius: 2px; }
.plan-bar-meta { display: flex; gap: 14px; font-size: 10px; color: #8B949E; flex-wrap: wrap; align-items: center; }

/* MOUNTAIN SVG */
.mountain-svg { display: block; margin: 0 0 16px; }

/* PAGE HEADER */
.page-eyebrow { font-family: monospace; font-size: 10px; color: #3FB950; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 5px; }
.page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: #8B949E; }

.header-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.session-count-card { background: #0D1117; border: 1px solid #21262D; border-radius: 8px; padding: 10px 16px; text-align: right; flex-shrink: 0; }
.session-count-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: #8B949E; margin-bottom: 3px; font-weight: 500; }
.session-count-val { font-family: monospace; font-size: 24px; font-weight: 600; color: #3FB950; line-height: 1; }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sb-brand sb-label">
      <div class="sb-app-name">TRAILAPP</div>
      <div class="sb-race-name">Ultra 80K</div>
      <div class="sb-race-sub">Sub 11h · 12 jun 2027</div>
    </div>
    <div class="sb-nav">
      <button class="nav-btn active" id="btn-dashboard" onclick="setView('dashboard')">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <rect x="1" y="1" width="5.5" height="5.5" rx="1.2" stroke="currentColor" stroke-width="1.3"></rect>
          <rect x="8.5" y="1" width="5.5" height="5.5" rx="1.2" stroke="currentColor" stroke-width="1.3"></rect>
          <rect x="1" y="8.5" width="5.5" height="5.5" rx="1.2" stroke="currentColor" stroke-width="1.3"></rect>
          <rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1.2" stroke="currentColor" stroke-width="1.3"></rect>
        </svg>
        <span class="sb-label" style="font-size:13px">Dashboard</span>
      </button>
      <button class="nav-btn" id="btn-progress" onclick="setView('progress')">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M1.5 11.5L5 7L8 9.5L13.5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"></path>
          <path d="M1.5 13.5H13.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"></path>
        </svg>
        <span class="sb-label" style="font-size:13px">Progreso</span>
      </button>
      <button class="nav-btn" id="btn-races" onclick="setView('races')">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M7.5 1.5V13.5M1.5 4H13.5M3 10H12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
        <span class="sb-label" style="font-size:13px">Carreras</span>
      </button>
    </div>
    <div class="sb-countdown sb-label">
      <div class="sb-countdown-label">Días hasta la carrera</div>
      <div class="sb-countdown-num" id="days-count">365</div>
      <div class="sb-countdown-date">12 jun 2027</div>
    </div>
    <div class="sb-device-sync sb-label">
      <button id="install-btn" onclick="installApp()" style="all: unset; cursor: pointer; padding: 16px 20px; width: 100%; text-align: left; border-top: 1px solid #e0e0e0; display: none;">
        <div style="font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; color: #3FB950; margin-bottom: 8px; font-weight: 600;">⬇ Instalar App</div>

function badgeClass(cat) {
  return 'badge badge-' + cat;
}

function daysUntil(dateStr) {
  const today = new Date();
  const target = new Date(dateStr);
  return Math.ceil((target - today) / 86400000);
}

function completedCount() {
  return Object.values(state.completedDays).filter(Boolean).length;
}

// Progress data utilities
function getProgressWeek(week) {
  return state.progressData[String(week)] || {};
}

function setProgressWeek(week, data) {
  state.progressData[String(week)] = data;
  saveProgressData();
}

function calcDeviation(real, theo) {
  if (!theo || theo === 0) return 0;
  return Math.round(((real - theo) / theo) * 1000) / 10;
}

function getDeviationColor(deviation) {
  if (Math.abs(deviation) <= 10) return 'success';
  if (Math.abs(deviation) <= 20) return 'warning';
  return 'error';
}

function exportToCSV() {
  const headers = ['Semana', 'Vol_Real_km', 'Vol_Teorico_km', 'Vol_Desv_%', 'D+_Real_m', 'D+_Teorico_m', 'D+_Desv_%', 'Ritmo_TL_min_km', 'Duracion_TL_h', 'Estado', 'Notas'];
  const rows = [];
  WEEKS_PLAN.forEach(w => {
    const data = state.progressData[String(w.week)] || {};
    const volDev = calcDeviation(data.volReal || 0, w.vol);
    const elevDev = calcDeviation(data.elevReal || 0, w.elev);
    rows.push([
      w.week,
      data.volReal || '',
      w.vol,
      volDev,
      data.elevReal || '',
      w.elev,
      elevDev,
      data.ritmo || '',
      data.duracion || '',
      data.status || '',
      data.notes || ''
    ]);
  });
  const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `progreso_ultra_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function clearProgressData() {
  if (confirm('¿Limpiar todos los datos de progreso? Esta acción no se puede deshacer.')) {
    state.progressData = {};
    saveProgressData();
    location.reload();
  }
}

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k === 'class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.append(typeof c === 'string' || typeof c === 'number' ? document.createTextNode(String(c)) : c);
  }
  return e;
}

  // Add extra activity button
  const addBtn = el('button', { style: 'margin-bottom:20px;padding:12px 16px;background:#3FB950;border:none;border-radius:6px;color:#0D1117;font-weight:600;font-size:13px;cursor:pointer;transition:background 0.2s' });
